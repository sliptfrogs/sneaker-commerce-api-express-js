version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: sneaker-postgres
    restart: always
    environment:
      POSTGRES_DB: sneaker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: sneaker-api
    restart: always

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sneaker_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - .:/app
    command: npm start

volumes:
  postgres_data:
